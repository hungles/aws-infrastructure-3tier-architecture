# ==============================================================================
# Pipeline: Terraform Destroy Multi-Módulo
# ⚠️  PELIGRO: Este pipeline DESTRUYE toda la infraestructura gestionada.
# Solo se puede ejecutar manualmente (workflow_dispatch).
# El usuario DEBE escribir "destroy" para confirmar la acción.
# ==============================================================================
name: "⚠️ Terraform Destroy"

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: '⚠️ Type "destroy" to confirm destroying ALL infrastructure'
        required: true
        type: string
      environment:
        description: "Environment to destroy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production

env:
  TF_VERSION: "1.9.5"
  AWS_REGION: "us-east-1"
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  VAR_FILE: "../configuration.tfvars"

jobs:
  # ----------------------------------------------------------------------------
  # JOB 1: Verificar confirmación — falla el pipeline si no escribió "destroy"
  # ----------------------------------------------------------------------------
  confirm:
    name: "🔐 Verificar confirmación"
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set_env.outputs.env_name }}
    permissions:
      id-token: write 
      contents: read

    steps:
      - name: "❌ Validar palabra de confirmación"
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "destroy" ]; then
            echo "::error::⛔ Confirmación inválida. Debes escribir exactamente 'destroy' para continuar."
            exit 1
          fi
          echo "✅ Confirmación recibida. Procediendo con la destrucción del ambiente: ${{ inputs.environment }}"
      
      - name: "Set environment name"
        id: set_env
        run: |
          SELECTED_ENV="${{ github.event.inputs.environment }}"
          
          if [ "$SELECTED_ENV" = "production" ]; then
            ENV_NAME="prd"
          elif [ "$SELECTED_ENV" = "staging" ]; then
            ENV_NAME="staging"
          else
            ENV_NAME="dev"
          fi
          
          echo "Ambiente mapeado: $ENV_NAME"
          echo "env_name=$ENV_NAME" >> $GITHUB_OUTPUT

  # ----------------------------------------------------------------------------
  # JOB 2: Plan de destrucción — muestra qué se va a eliminar antes de actuar
  # ----------------------------------------------------------------------------
  destroy-plan:
    name: "📋 Plan de destrucción"
    runs-on: ubuntu-latest
    needs: confirm
    permissions:
      id-token: write 
      contents: read
    environment: ${{ inputs.environment }}

    steps:
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: "🔐 Configurar credenciales AWS via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # - name: "💣 Plan Destroy — Módulo Instances"
      #   working-directory: instances
      #   env:
      #     TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      #     TF_VAR_environment: ${{ needs.confirm.outputs.env_name }}
      #   run: |
      #     echo "=== 1. Terraform Init (instances) ==="
      #     terraform init \
      #       -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
      #       -backend-config="key=aws-infrastructure-3tier/instances/terraform.tfstate" \
      #       -backend-config="region=${{ env.AWS_REGION }}" \
      #       -backend-config="encrypt=true"
          
      #     echo "=== 2. Terraform Plan -destroy (instances) ==="
      #     terraform plan \
      #       -destroy \
      #       -var-file="${{ env.VAR_FILE }}" \
      #       -out=instances_destroy.tfplan \
      #       -no-color

      - name: "💣 Plan Destroy — Módulo Network"
        working-directory: network
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_environment: ${{ needs.confirm.outputs.env_name }}
        run: |
          echo "=== 1. Terraform Init (network) ==="
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=aws-infrastructure-3tier/network/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"
          
          echo "=== 2. Terraform Plan -destroy (network) ==="
          terraform plan \
            -destroy \
            -var-file="${{ env.VAR_FILE }}" \
            -out=network_destroy.tfplan \
            -no-color

      # - name: "💾 Guardar plan de destrucción (Instances) como artefacto"
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: instances-destroy-tfplan
      #     path: instances/instances_destroy.tfplan
      #     retention-days: 1

      - name: "💾 Guardar plan de destrucción (Network) como artefacto"
        uses: actions/upload-artifact@v4
        with:
          name: network-destroy-tfplan
          path: network/network_destroy.tfplan
          retention-days: 1

  # ----------------------------------------------------------------------------
  # JOB 3: Destroy — requiere aprobación manual del environment en GitHub
  # ----------------------------------------------------------------------------
  destroy:
    name: "💥 Terraform Destroy"
    runs-on: ubuntu-latest
    needs: [confirm, destroy-plan]
    permissions:
      id-token: write 
      contents: read
    # Requiere que el environment tenga revisores configurados en GitHub
    environment: ${{ inputs.environment }}

    steps:
      - name: "📥 Checkout del código"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Terraform ${{ env.TF_VERSION }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: "🔐 Configurar credenciales AWS via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # - name: "📥 Descargar plan de destrucción (Instances)"
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: instances-destroy-tfplan
      #     path: instances

      - name: "📥 Descargar plan de destrucción (Network)"
        uses: actions/download-artifact@v4
        with:
          name: network-destroy-tfplan
          path: network

      # # - name: "💥 Destroy Módulo Instances (1/2)"
      #   working-directory: instances
      #   env:
      #     TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      #     TF_VAR_environment: ${{ needs.confirm.outputs.env_name }}
      #   run: |
      #     echo "🔴 (1/2) Destruyendo Módulo Instances en ambiente: ${{ inputs.environment }}"
      #     terraform init \
      #       -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
      #       -backend-config="key=aws-infrastructure-3tier/instances/terraform.tfstate" \
      #       -backend-config="region=${{ env.AWS_REGION }}" \
      #       -backend-config="encrypt=true"
      #     terraform apply -auto-approve instances_destroy.tfplan

      - name: "💥 Destroy Módulo Network (2/2)"
        working-directory: network
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_environment: ${{ needs.confirm.outputs.env_name }}
        run: |
          echo "🔴 (2/2) Destruyendo Módulo Network en ambiente: ${{ inputs.environment }}"
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=aws-infrastructure-3tier/network/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="encrypt=true"
          terraform apply -auto-approve network_destroy.tfplan

      - name: "📝 Resumen de destrucción"
        if: always()
        run: |
          echo "## 💥 Terraform Destroy completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌍 Ambiente | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Módulos Destruidos | \`instances\`, \`network\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 👤 Ejecutado por | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Fecha | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔑 Confirmación | \`${{ inputs.confirmation }}\` |" >> $GITHUB_STEP_SUMMARY
