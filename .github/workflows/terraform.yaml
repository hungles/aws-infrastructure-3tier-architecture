# ==============================================================================
# Pipeline: Terraform CI/CD Multi-Módulo
# Descripción: Invoca el reusable workflow reusable-terraform.yaml para ejecutar
#              el pipeline de Terraform en cada directorio/recurso (network, instances).
# ==============================================================================
name: "Terraform CI/CD"

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  set-env:
    name: "⚙️ Configurar Ambiente"
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.env_step.outputs.target_env }}
      enable_apply: ${{ steps.env_step.outputs.enable_apply }}
    steps:
      - name: "Calcular ambiente y permisos de Apply"
        id: env_step
        run: |
          TARGET_BRANCH="${{ github.base_ref || github.ref_name }}"
          if [ "$TARGET_BRANCH" = "main" ]; then
            echo "target_env=production" >> $GITHUB_OUTPUT
          else
            echo "target_env=dev" >> $GITHUB_OUTPUT
          fi

          if [ "${{ github.event_name }}" = "push" ] && ( [ "$TARGET_BRANCH" = "main" ] || [ "$TARGET_BRANCH" = "dev" ] ); then
            echo "enable_apply=true" >> $GITHUB_OUTPUT
          else
            echo "enable_apply=false" >> $GITHUB_OUTPUT
          fi

  # ----------------------------------------------------------------------------
  # MÓDULO 1: Network (Redes, VPC, Subredes)
  # ----------------------------------------------------------------------------
  network:
    name: "🌐 Redes (Network)"
    needs: set-env
    uses: ./.github/workflows/reusable-terraform.yaml
    with:
      working_directory: "network"
      environment: ${{ needs.set-env.outputs.target_env }}
      tf_version: "1.9.5"
      aws_region: "us-east-1"
      tf_state_key: "aws-infrastructure-3tier/network/terraform.tfstate"
      var_file: "../configuration.tfvars"
      enable_apply: ${{ needs.set-env.outputs.enable_apply == 'true' }}
    secrets: inherit

  # ----------------------------------------------------------------------------
  # MÓDULO 2: Instances (Servidores EC2) - Depende de Network
  # ----------------------------------------------------------------------------
  # instances:
  #   name: "💻 Computo (Instances)"
  #   needs: [set-env, network]
  #   uses: ./.github/workflows/reusable-terraform.yaml
  #   with:
  #     working_directory: "instances"
  #     environment: ${{ needs.set-env.outputs.target_env }}
  #     tf_version: "1.9.5"
  #     aws_region: "us-east-1"
  #     tf_state_key: "aws-infrastructure-3tier/instances/terraform.tfstate"
  #     var_file: "../configuration.tfvars"
