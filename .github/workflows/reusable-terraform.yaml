# ==============================================================================
# Workflow Reutilizable: Terraform CI/CD Módulos
# Ubicación: .github/workflows/reusable-terraform.yaml
# Descripción: Reusable workflow para ejecutar fmt, validate, plan y apply
#              en un directorio de trabajo (working_directory) específico.
# ==============================================================================
name: "Reusable Terraform Workflow"

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
        description: "Terraform module working directory (e.g., network, instances)"
      environment:
        required: false
        type: string
        default: "dev"
        description: "Deployment environment (dev, production)"
      tf_version:
        required: false
        type: string
        default: "1.9.5"
        description: "Terraform version to install"
      aws_region:
        required: false
        type: string
        default: "us-east-1"
        description: "AWS Region"
      tf_state_bucket:
        required: false
        type: string
        default: ""
        description: "S3 bucket name (if empty, uses secrets.TF_STATE_BUCKET)"
      tf_state_key:
        required: true
        type: string
        description: "S3 key path for the .tfstate file"
      var_file:
        required: false
        type: string
        default: ""
        description: "Path to the .tfvars file (optional)"
      custom_vars:
        required: false
        type: string
        default: ""
        description: "Variables dinámicas en formato KEY=VALUE (una por línea) exportadas como TF_VAR_<KEY>"
      enable_apply:
        required: false
        type: boolean
        default: false
        description: "Indicates whether the terraform apply step should be executed"
    secrets:
      TF_STATE_BUCKET:
        required: false
        description: "State S3 bucket name (inherited or passed explicitly)"
      AWS_ROLE_TO_ASSUME:
        required: false
        description: "IAM Role ARN for OIDC authentication"
      TF_API_TOKEN:
        required: false
        description: "Terraform Cloud / Enterprise token if required"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  fmt-and-validate:
    name: "Format & Validate (${{ inputs.working_directory }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: "Checkout del código"
        uses: actions/checkout@v4

      - name: "Setup Terraform ${{ inputs.tf_version }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: "Export Dynamic TF_VARs"
        if: inputs.custom_vars != ''
        env:
          CUSTOM_VARS: ${{ inputs.custom_vars }}
        run: |
          echo "$CUSTOM_VARS" | while IFS= read -r line || [ -n "$line" ]; do
            line=$(echo "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            if [ -z "$line" ] || [[ "$line" =~ ^# ]]; then
              continue
            fi
            KEY="${line%%=*}"
            VALUE="${line#*=}"
            KEY=$(echo "$KEY" | xargs)
            VALUE=$(echo "$VALUE" | xargs)
            if [ -n "$KEY" ]; then
              DELIMITER="EOF_${RANDOM}"
              {
                echo "TF_VAR_${KEY}<<${DELIMITER}"
                echo "${VALUE}"
                echo "${DELIMITER}"
              } >> $GITHUB_ENV
              echo "Exported variable TF_VAR_${KEY}"
            fi
          done

      - name: "Terraform fmt (verificación de formato)"
        id: fmt
        run: terraform fmt -check -recursive

      - name: "Configure AWS Credentials via OIDC"
        if: env.AWS_ROLE_TO_ASSUME != ''
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: "Configure AWS Credentials via Access Keys"
        if: env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: "Terraform init"
        id: init
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: |
          BUCKET="${{ inputs.tf_state_bucket }}"
          if [ -z "$BUCKET" ]; then
            BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          fi

          terraform init \
            -backend-config="bucket=$BUCKET" \
            -backend-config="key=${{ inputs.tf_state_key }}" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="encrypt=true"

      - name: "Terraform validate"
        id: validate
        run: terraform validate -no-color

      - name: "Comentar resultado de Validación en PR"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### 🔍 Terraform Format & Validate (\`${{ inputs.working_directory }}\`)
            * **Format:** \`${{ steps.fmt.outcome }}\`
            * **Init:** \`${{ steps.init.outcome }}\`
            * **Validate:** \`${{ steps.validate.outcome }}\`

            *Ejecutado por: @${{ github.actor }}, Evento: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  plan:
    name: "Terraform Plan (${{ inputs.working_directory }})"
    runs-on: ubuntu-latest
    needs: fmt-and-validate
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: "Checkout del código"
        uses: actions/checkout@v4

      - name: "Set environment name"
        id: set_env
        run: |
          if [ "${{ inputs.environment }}" = "production" ] || [ "${{ inputs.environment }}" = "prod" ]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

      - name: "Setup Terraform ${{ inputs.tf_version }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: "Export Dynamic TF_VARs"
        if: inputs.custom_vars != ''
        env:
          CUSTOM_VARS: ${{ inputs.custom_vars }}
        run: |
          echo "$CUSTOM_VARS" | while IFS= read -r line || [ -n "$line" ]; do
            line=$(echo "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            if [ -z "$line" ] || [[ "$line" =~ ^# ]]; then
              continue
            fi
            KEY="${line%%=*}"
            VALUE="${line#*=}"
            KEY=$(echo "$KEY" | xargs)
            VALUE=$(echo "$VALUE" | xargs)
            if [ -n "$KEY" ]; then
              DELIMITER="EOF_${RANDOM}"
              {
                echo "TF_VAR_${KEY}<<${DELIMITER}"
                echo "${VALUE}"
                echo "${DELIMITER}"
              } >> $GITHUB_ENV
              echo "Exported variable TF_VAR_${KEY}"
            fi
          done

      - name: "Configure AWS Credentials via OIDC"
        if: env.AWS_ROLE_TO_ASSUME != ''
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: "Configure AWS Credentials via Access Keys"
        if: env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: "Terraform init"
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: |
          BUCKET="${{ inputs.tf_state_bucket }}"
          if [ -z "$BUCKET" ]; then
            BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          fi

          terraform init \
            -backend-config="bucket=$BUCKET" \
            -backend-config="key=${{ inputs.tf_state_key }}" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="encrypt=true"

      - name: "Terraform plan"
        id: plan
        env:
          TF_VAR_environment: ${{ steps.set_env.outputs.env_name }}
        run: |
          VAR_FILE_ARG=""
          if [ -n "${{ inputs.var_file }}" ] && [ -f "${{ inputs.var_file }}" ]; then
            VAR_FILE_ARG="-var-file=${{ inputs.var_file }}"
          elif [ -f "configuration.tfvars" ]; then
            VAR_FILE_ARG="-var-file=configuration.tfvars"
          elif [ -f "../configuration.tfvars" ]; then
            VAR_FILE_ARG="-var-file=../configuration.tfvars"
          fi

          echo "Ejecutando plan con argumento: $VAR_FILE_ARG"
          terraform plan $VAR_FILE_ARG -out=tfplan.binary -no-color 2>&1 | tee plan_output.txt

      - name: "Calcular nombre de artefacto"
        id: artifact_name
        run: |
          CLEAN_DIR=$(echo "${{ inputs.working_directory }}" | sed 's/[^a-zA-Z0-9_-]/-/g')
          echo "name=tfplan-${CLEAN_DIR}" >> $GITHUB_OUTPUT

      - name: "Guardar plan como artefacto"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: ${{ inputs.working_directory }}/tfplan.binary
          retention-days: 5

      - name: "Publicar plan en PR"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = '${{ inputs.working_directory }}/plan_output.txt';
            let planOutput = '';
            try {
              planOutput = fs.readFileSync(path, 'utf8');
            } catch (e) {
              planOutput = 'No se pudo obtener el log del plan.';
            }
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... (output truncado)'
              : planOutput;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### 📋 Terraform Plan (\`${{ inputs.working_directory }}\`) \`${{ steps.plan.outcome }}\`
            <details><summary>Ver plan completo</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Ejecutado por: @${{ github.actor }}*`
            });

  apply:
    name: "Terraform Apply (${{ inputs.working_directory }})"
    runs-on: ubuntu-latest
    needs: plan
    if: ${{ inputs.enable_apply }}
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: "Checkout del código"
        uses: actions/checkout@v4

      - name: "Set environment name"
        id: set_env
        run: |
          if [ "${{ inputs.environment }}" = "production" ] || [ "${{ inputs.environment }}" = "prod" ]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

      - name: "Setup Terraform ${{ inputs.tf_version }}"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: "Export Dynamic TF_VARs"
        if: inputs.custom_vars != ''
        env:
          CUSTOM_VARS: ${{ inputs.custom_vars }}
        run: |
          echo "$CUSTOM_VARS" | while IFS= read -r line || [ -n "$line" ]; do
            line=$(echo "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
            if [ -z "$line" ] || [[ "$line" =~ ^# ]]; then
              continue
            fi
            KEY="${line%%=*}"
            VALUE="${line#*=}"
            KEY=$(echo "$KEY" | xargs)
            VALUE=$(echo "$VALUE" | xargs)
            if [ -n "$KEY" ]; then
              DELIMITER="EOF_${RANDOM}"
              {
                echo "TF_VAR_${KEY}<<${DELIMITER}"
                echo "${VALUE}"
                echo "${DELIMITER}"
              } >> $GITHUB_ENV
              echo "Exported variable TF_VAR_${KEY}"
            fi
          done

      - name: "Configure AWS Credentials via OIDC"
        if: env.AWS_ROLE_TO_ASSUME != ''
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: "Configure AWS Credentials via Access Keys"
        if: env.AWS_ROLE_TO_ASSUME == '' && env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: "Terraform init"
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: |
          BUCKET="${{ inputs.tf_state_bucket }}"
          if [ -z "$BUCKET" ]; then
            BUCKET="${{ secrets.TF_STATE_BUCKET }}"
          fi

          terraform init \
            -backend-config="bucket=$BUCKET" \
            -backend-config="key=${{ inputs.tf_state_key }}" \
            -backend-config="region=${{ inputs.aws_region }}" \
            -backend-config="encrypt=true"

      - name: "Calcular nombre de artefacto"
        id: artifact_name
        run: |
          CLEAN_DIR=$(echo "${{ inputs.working_directory }}" | sed 's/[^a-zA-Z0-9_-]/-/g')
          echo "name=tfplan-${CLEAN_DIR}" >> $GITHUB_OUTPUT

      - name: "Descargar plan guardado"
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: ${{ inputs.working_directory }}

      - name: "Terraform apply"
        env:
          TF_VAR_environment: ${{ steps.set_env.outputs.env_name }}
        run: terraform apply -auto-approve tfplan.binary
